name: Bug report
description: Report a reproducible defect with expected vs actual behavior
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Provide enough detail for reproducibility and impact assessment.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (app crash/data loss/security)
        - High (core flow blocked)
        - Medium (feature degraded)
        - Low (minor issue)
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: Briefly describe the bug
    validations:
      required: true

  - type: textarea
    id: preconditions
    attributes:
      label: Preconditions
      placeholder: User state, test data, network state, etc.
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Go to...
        2. Tap...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true

  - type: input
    id: frequency
    attributes:
      label: Repro frequency
      placeholder: Always / Often / Sometimes / Rarely
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        App version/build:
        Platform: iOS/Android
        OS version:
        Device:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / API response / stack trace
      render: shell
    validations:
      required: false

  - type: textarea
    id: attachments
    attributes:
      label: Screenshots / videos
      placeholder: Paste links or attach files
    validations:
      required: false

  - type: checkboxes
    id: regression
    attributes:
      label: Regression impact checklist
      options:
        - label: I checked related flows (list/search/detail/create/update/delete).
        - label: I included enough details for developers to reproduce.
